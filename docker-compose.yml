version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: irebas_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: irebas
      MYSQL_USER: irebas_user
      MYSQL_PASSWORD: irebas_password
    # Removed port 3306 binding to prevent collision with aaPanel's local MySQL
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - irebas_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: irebas_pma
    restart: always
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "8081:80" # Exposed on port 8081 to avoid conflict with aaPanel
    networks:
      - irebas_network
    depends_on:
      - db

  backend:
    build:
      context: ./backend
    container_name: irebas_backend
    restart: always
    ports:
      - "5005:5000" # Mapped to 5005 on host
    environment:
      DB_HOST: db
      DB_USER: irebas_user
      DB_PASSWORD: irebas_password
      DB_NAME: irebas
      JWT_SECRET: supersecretjwtkey
      PORT: 5000
    networks:
      - irebas_network
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
    container_name: irebas_frontend
    restart: always
    ports:
      - "3005:80" # Mapped port 80 inside container to 3005 on the host server
    networks:
      - irebas_network
    depends_on:
      - backend

networks:
  irebas_network:
    driver: bridge

volumes:
  db_data:
